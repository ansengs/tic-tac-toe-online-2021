<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Tic-Tac-Toe snippets</title><style>
*{box-sizing:border-box} body{margin:0;font-family:'Helvetica Neue',Arial,sans-serif;background:#eee;color:#000} .frame{position:relative;width:100vw;height:100vh;background:#fff;overflow:hidden} .board{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);width:430px;height:430px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:22px;padding:18px;background:white}
.board:before,.board:after,.v1,.v2{content:"";position:absolute;background:#000;border-radius:6px}.v1{left:33.33%;top:0;width:12px;height:100%;transform:translateX(-50%)}.v2{left:66.66%;top:0;width:12px;height:100%;transform:translateX(-50%)}.board:before{top:33.33%;left:0;height:12px;width:100%;transform:translateY(-50%)}.board:after{top:66.66%;left:0;height:12px;width:100%;transform:translateY(-50%)}.cell{z-index:1;display:flex;align-items:center;justify-content:center;font-size:106px;font-weight:200;line-height:1}.x{font-size:120px}.o{border:12px solid #000;border-radius:50%;width:92px;height:92px}.menu{position:absolute;left:50%;top:10%;transform:translate(-50%,-10%);display:grid;gap:1.2em;text-align:center}.menu span,.side span{font-size:34px;font-weight:300;white-space:nowrap}.side{position:absolute;left:25px;top:62px;display:grid;gap:1.2em}.side span{font-size:24px}.room{position:absolute;right:25px;top:25px;font-size:24px;font-weight:300}.status{position:absolute;left:50%;top:6.25%;transform:translate(-50%,-6.25%);font-size:32px;font-weight:300;white-space:nowrap}.panel{position:absolute;left:50%;top:6.25%;transform:translate(-50%,-6.25%);display:grid;gap:1.2em;text-align:center}.join input{font-size:16px;border-radius:15px;border:2px solid #000;padding:8px 14px;text-align:center}.title{font-size:32px;font-weight:300}.choices{display:flex;gap:28px;justify-content:center}.choice,.pill{font-size:20px;font-weight:300;color:#fff;background:#000;border-radius:30px;padding:10px 38px}.result{position:absolute;left:50%;top:6.25%;transform:translate(-50%,-6.25%);font-size:96px;font-weight:300}.newgame{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;gap:1.2em;align-items:center}.newgame .headline{font-size:42px;background:#000;color:#fff;border-radius:30px;padding:8px 36px;font-weight:300}.hamb{position:absolute;left:25px;top:25px;width:24px;height:24px}.hamb:before,.hamb:after,.hamb i{content:"";position:absolute;left:0;width:24px;height:3px;background:#000}.hamb:before{top:3px}.hamb i{top:10px}.hamb:after{top:17px}.caption{position:absolute;left:25px;bottom:20px;font-size:13px;color:#555}.mobile .board{width:80vw;height:80vw;max-width:390px;max-height:390px;top:80%}.mobile .menu span{font-size:32px}.mobile .title{font-size:24px}.mobile .status{font-size:24px;top:12.5%}.mobile .room{font-size:16px}.mobile .side{left:50%;top:12.5%;transform:translate(-50%,-12.5%);text-align:center}.mobile .side span{font-size:24px}
</style></head><body><div id='root'></div><script>
const root=document.getElementById('root');
function board(moves=[]){let vals=['','','','','','','','','']; moves.forEach(([i,v])=>vals[i]=v); return `<div class="board"><i class="v1"></i><i class="v2"></i>${vals.map(v=>`<div class="cell">${v==='X'?'<span class=x>×</span>':v==='O'?'<span class=o></span>':''}</div>`).join('')}</div>`}
function render(state){let body=''; if(state==='start') body=`<div class=menu><span>Random Match</span><span>Join Player</span><span>Host</span></div>${board()}`; if(state==='join') body=`<div class=hamb><i></i></div><div class='panel join'><div class=title>Join Room</div><input placeholder='enter room id'></div>${board()}`; if(state==='host') body=`<div class=hamb><i></i></div><div class=panel><div class=title>Room Restriction</div><div class=choices><span class=choice>Public</span><span class=choice>Private</span></div></div>${board()}`; if(state==='play') body=`<div class=hamb><i></i></div><div class=room>room id: A7kP2</div><div class=status>Your Turn</div><div class=side><span>Random Match</span><span>Join Player</span><span>Host</span><span>Leave</span></div>${board([[0,'X'],[1,'O'],[4,'X'],[8,'O']])}`; if(state==='result') body=`<div class=hamb><i></i></div><div class=room>room id: A7kP2</div><div class=result>WON</div><div class=newgame><div class=headline>NEW GAME</div><div class=choices><span class=choice>Yes</span><span class=choice>No</span></div></div>${board([[0,'X'],[1,'O'],[3,'O'],[4,'X'],[8,'X']])}`; root.innerHTML=`<div class="frame ${innerWidth<700?'mobile':''}">${body}<div class=caption>${state} screen</div></div>`}
render(new URLSearchParams(location.search).get('state')||'start');
</script></body></html>
